services:
  nuclei-scanner:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./scan-results:/app/results

  sast-scanner:
    build:
      context: .
      dockerfile: "SemgrepRules/Dockerfile"
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
