# AI Commit Trap audit configuration
# Consumed by scripts/scan.py and scripts/scan.ps1
# Patterns are matched case-insensitively against file contents and git history.

# Directories and files to skip (relative globs)
exclude_patterns:
  - node_modules
  - .git/objects
  - dist
  - build
  - __pycache__
  - .venv
  - venv
  - vendor

# Sensitive filenames that should never be committed
sensitive_filenames:
  - ".env"
  - ".env.example"
  - ".npmrc"
  - "pip.conf"
  - "cargo/config"
  - "kubeconfig"
  - "kubeconfig.yaml"
  - ".kube/config"
  - "id_rsa"
  - "id_ed25519"
  - "*.pem"
  - "*.key"
  - "*.p12"
  - "*.pfx"
  - "*.crt"
  - "terraform.tfstate"
  - "*.tfvars"
  - "web.config"
  - "docker-compose.yml"
  - "application.yml"
  - "application.properties"
  - "Dockerfile"

# Regex patterns for high-risk secret assignments (groups: name, regex, severity)
patterns:
  - name: "AWS Access Key ID"
    regex: "AKIA[0-9A-Z]{16}"
    severity: "high"
  - name: "AWS Secret Access Key"
    regex: "(?i)aws_secret_access_key\\s*[:=]\\s*['\\\"]?[A-Za-z0-9/+=]{40}"
    severity: "high"
  - name: "OpenAI API Key"
    regex: "sk-(proj-)?[A-Za-z0-9_-]{20,}"
    severity: "high"
  - name: "Stripe Live Key"
    regex: "sk_live_[0-9a-zA-Z]{24,}"
    severity: "high"
  - name: "Google API Key"
    regex: "AIza[0-9A-Za-z_-]{35}"
    severity: "high"
  - name: "Private Key Block"
    regex: "-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----"
    severity: "high"
  - name: "Generic Secret Assignment"
    regex: "(?i)(password|passwd|pwd|secret|token|api[_-]?key|access[_-]?key|client[_-]?secret|private[_-]?key|auth)['\\\"]?\\s*[:=]\\s*['\\\"][^'\\\"]{6,}"
    severity: "medium"
  - name: "Connection String"
    regex: "(?i)(postgres|postgresql|mysql|mongodb|redis|mssql|jdbc)://[^:]+:[^@]+@"
    severity: "high"
  - name: "npm Auth Token"
    regex: "(?i)(_auth|_authtoken|//.*:_password)\\s*[:=]\\s*['\\\"]?[A-Za-z0-9=+/]{20,}"
    severity: "high"
  - name: "Docker Hub / Registry Token"
    regex: "(?i)(dockerhub|registry|ghcr|quay)[^a-z0-9]*(token|password|secret)\\s*[:=]"
    severity: "medium"
  - name: "Kubeconfig Token/Data"
    regex: "(?i)(client-certificate-data|client-key-data|token:)\\s*\\S+"
    severity: "high"
  - name: "High-Entropy String"
    regex: "(?i)(secret|key|token|password)\\s*[:=]\\s*['\\\"][A-Za-z0-9+/=]{32,}"
    severity: "medium"

# Mask all but first 4 and last 4 chars of any captured secret value
mask_secret: true
